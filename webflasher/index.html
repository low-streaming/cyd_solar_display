<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>CYD Solar Display - Web Flasher</title>
  <style>
    body { font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #0d0d12; color: #fff; text-align: center; padding: 50px; }
    h1 { color: #fdd835; }
    .card { background: #1a1a1c; border-radius: 12px; padding: 30px; display: inline-block; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #333; }
    esp-web-install-button { --esp-tools-button-color: #00f3ff; --esp-tools-button-text-color: #000; }
  </style>
  <script type="module" src="https://unpkg.com/esp-web-tools@10/dist/web/install-button.js?module"></script>
</head>
<body>
  <div class="card">
    <h1>CYD Solar Display</h1>
    <p>Version v1.2.7 - OpenKairo Edition</p>
    <p style="color: #888; font-size: 0.9em; margin-bottom: 30px;">Verbinde dein Display per USB und klicke auf installieren.</p>
    
    <esp-web-install-button manifest="./manifest.json"></esp-web-install-button>
  </div>
</body>
</html>
