    type: bool
    restore_value: yes
    initial_value: 'false'
  - id: local_page_total
    type: int
    restore_value: no
    initial_value: '5'
  - id: touch_flash
    type: int
    restore_value: no
    initial_value: '0'
  - id: touch_override_ticks
    type: int
    restore_value: no
    initial_value: '0'
  - id: dim_start_time
    type: int
    restore_value: no
    initial_value: '22'
  - id: dim_end_time
    type: int
    restore_value: no
    initial_value: '6'
  - id: dim_brightness
    type: float
    restore_value: no
    initial_value: '20.0'
  - id: page1_enabled
    type: bool
    restore_value: yes
    initial_value: 'true'
  - id: page2_enabled
    type: bool
    restore_value: yes
    initial_value: 'true'
  - id: page3_enabled
    type: bool
    restore_value: yes
    initial_value: 'true'
  - id: page4_enabled
