# =======================================================
# GLOBALE VARIABLEN fuer lokale Seiten-Steuerung
# =======================================================
globals:
  - id: local_page
    type: int
    restore_value: yes
    initial_value: '1'
  - id: online_version
    type: std::string
    initial_value: '"Wird geprüft..."'
  - id: update_available
    type: bool
    initial_value: 'false'
  - id: update_in_progress
    type: bool
    initial_value: 'false'
  - id: last_ha_page
    type: int
    restore_value: yes
    initial_value: '-1'
  - id: auto_switch_enabled
    type: bool
    restore_value: yes
    initial_value: 'false'  # HA steuert das Auto-Switching
  - id: local_page_total
    type: int
    restore_value: no
    initial_value: '5'
  - id: touch_flash
    type: int
    restore_value: no
    initial_value: '0'
  - id: touch_override_ticks
    type: int
    restore_value: no
    initial_value: '0'
  - id: dim_start_time
    type: int
    restore_value: no
    initial_value: '22'
  - id: dim_end_time
    type: int
    restore_value: no
    initial_value: '6'
  - id: dim_brightness
    type: float
    restore_value: no
    initial_value: '20.0'
  - id: page1_enabled
    type: bool
    restore_value: yes
    initial_value: 'true'
  - id: page2_enabled
    type: bool
    restore_value: yes
    initial_value: 'true'
  - id: page3_enabled
    type: bool
    restore_value: yes
    initial_value: 'true'
  - id: page4_enabled
    type: bool
    restore_value: yes
    initial_value: 'true'
  - id: page5_enabled
    type: bool
    restore_value: yes
    initial_value: 'true'
  - id: page6_enabled
    type: bool
    restore_value: yes
    initial_value: 'true'
  - id: page7_enabled
    type: bool
    restore_value: yes
    initial_value: 'true'
  - id: page8_enabled
    type: bool
    restore_value: yes
    initial_value: 'true'
  - id: page9_enabled
    type: bool
    restore_value: yes
    initial_value: 'true'

# =======================================================
# AUTO-SEITEN-WECHSEL (lokal auf ESP32, alle 15 Sekunden)
# Laeuft nur wenn kein Touch-Override aktiv!
# =======================================================
script:
  - id: set_local_page
    parameters:
      target_page: int
    then:
      - globals.set:
          id: local_page
          value: !lambda 'return target_page;'
        it.printf(22, 75, id(font_label), id(color_text), TextAlign::TOP_LEFT, "Version: %s", "${version}");
        it.printf(22, 90, id(font_label), id(color_text), TextAlign::TOP_LEFT, "Online:  %s", id(online_version).c_str());
        it.printf(22, 105, id(font_label), id(color_text), TextAlign::TOP_LEFT, "IP: %s", id(wifi_ip).state.c_str());
        
        // Buttons
        // Button 1: Restart
        it.filled_rectangle(22, 135, 130, 40, id(color_bg));
        it.rectangle(22, 135, 130, 40, id(color_text));
        it.print(87, 155, id(font_label), id(color_text), TextAlign::CENTER, "NEUSTART");
        
        // Button 2: Cloud Update (nur wenn verfügbar)
        if (id(update_in_progress)) {
            it.filled_rectangle(162, 135, 138, 40, id(color_solar));
            it.print(231, 155, id(font_label), id(color_bg), TextAlign::CENTER, "LADE...");
        } else if (id(update_available)) {
            it.filled_rectangle(162, 135, 138, 40, id(color_solar));
            it.print(231, 155, id(font_label), id(color_bg), TextAlign::CENTER, "JETZT UPDATEN");
        } else {
            it.rectangle(162, 135, 138, 40, id(color_text));
            it.print(231, 155, id(font_label), id(color_text), TextAlign::CENTER, "AKTUELL");
        }
        
        it.print(160, 195, id(font_label), id(color_text), TextAlign::CENTER, "Forgematrix.de x Openkairo.de");
      }

      // FOOTER
      it.filled_rectangle(0, 222, 320, 18, id(color_panel));
      it.line(0, 222, 320, 222, id(color_text));
      
      // Touch-Flash: zeige Tippen-Symbol kurz an
      if (id(touch_flash) > 0) {
        id(touch_flash)--;
        it.printf(5, 231, id(font_label), id(color_solar), TextAlign::CENTER_LEFT, "< >");
      } else {
        it.printf(5, 231, id(font_label), id(color_panel), TextAlign::CENTER_LEFT, "< >"); // unsichtbar
      }
      
      // Seitenanzeige (lokal) mit korrekter Index-Berechnung
      int idx = 0;
      int tot = 0;
      bool p[9] = {
        id(page1_enabled), id(page2_enabled), id(page3_enabled), 
        id(page4_enabled), id(page5_enabled), id(page6_enabled),
        id(page7_enabled), id(page8_enabled), id(page9_enabled)
      };
      for(int i=0; i<9; i++){
        if(p[i]) {
          tot++;
          if((i+1) == page) idx = tot;
        }
      }
      if(idx == 0) idx = 1;
      if(tot == 0) tot = (page == 10) ? 10 : total;
      
      const char* footer_text = (page == 10) ? "SYSTEM-INFO" : "SEITE %d / %d";
      if (page == 10) it.printf(160, 231, id(font_label), id(color_solar), TextAlign::CENTER, footer_text);
      else it.printf(160, 231, id(font_label), id(color_house), TextAlign::CENTER, footer_text, idx, tot);
      
      // Periodisch den tatsaechlichen Index an HA zurueckmelden (alle ~2s bei ~30Hz Refresh)
      static int report_throttle = 0;
      if (report_throttle++ > 60) {
          report_throttle = 0;
          id(page_display_idx).publish_state(idx);
          id(page_display_total).publish_state(tot);
      }
      
      // Touch-Override-Anzeige rechts im Footer
      if (id(touch_override_ticks) > 0) {
        it.print(315, 231, id(font_label), id(color_solar), TextAlign::CENTER_RIGHT, "[>"); // aktiv
      } else {
        it.print(315, 231, id(font_label), id(color_text), TextAlign::CENTER_RIGHT, "[>"); // normal
      }

# =======================================================
# TOUCHSCREEN Setup
# =======================================================
touchscreen:
  - platform: xpt2046
    id: my_touch
    spi_id: spi_touch
    display: cyd_display
    cs_pin: 33
    interrupt_pin: 36
    threshold: 400
    calibration:
      x_min: 380
      x_max: 3800
      y_min: 300
      y_max: 3800
    transform:
      mirror_x: true
      mirror_y: false
      swap_xy: true
    on_touch:
      then:
        - lambda: |-
            int tx = touch.x;
            int ty = touch.y;
            
            // Check for System Page Buttons
            if (id(local_page) == 10) {
              // Restart Button: rectangle(22, 135, 130, 40)
              if (tx > 22 && tx < 152 && ty > 135 && ty < 175) {
                id(cyd_restart).press();
                return;
              }
              // Update Button: rectangle(162, 135, 138, 40)
              if (tx > 162 && tx < 300 && ty > 135 && ty < 175) {
                if (id(update_available) && !id(update_in_progress)) {
                  id(perform_cloud_update).execute();
                } else {
                  id(check_for_update).execute();
                }
                return;
              }
            }

            int next_page = id(local_page);
            bool found = false;
            // Loop including page 10 (System)
            for (int i = 0; i < 10; i++) {
              next_page++;
              if (next_page > 10) next_page = 1;
              
              // System page is always "enabled" locally
              if (next_page == 10) {
                id(set_local_page).execute(10);
                found = true;
                break;
              }
              
              bool is_en = false;
              if (next_page == 1) is_en = id(page1_enabled);
              if (next_page == 2) is_en = id(page2_enabled);
              if (next_page == 3) is_en = id(page3_enabled);
              if (next_page == 4) is_en = id(page4_enabled);
              if (next_page == 5) is_en = id(page5_enabled);
              if (next_page == 6) is_en = id(page6_enabled);
              if (next_page == 7) is_en = id(page7_enabled);
              if (next_page == 8) is_en = id(page8_enabled);
              if (next_page == 9) is_en = id(page9_enabled);
              
              if (is_en) {
                id(set_local_page).execute(next_page);
                found = true;
                break;
              }
            }
            if (!found) {
              id(set_local_page).execute(1);
            }
            
            id(touch_flash) = 3;
            id(touch_override_ticks) = 30;
            ESP_LOGI("touch", "Touch! Seite %d", id(local_page));

# =======================================================
# TOUCH BUTTON - GANZER BILDSCHIRM
# Ueberall tippen = naechste Seite
# =======================================================
binary_sensor:
  - platform: touchscreen
    touchscreen_id: my_touch
    name: "Display Touch Aktiv"
    x_min: 0
    x_max: 320
    y_min: 0
    y_max: 240
