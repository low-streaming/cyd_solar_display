# =======================================================
# GLOBALE VARIABLEN fuer lokale Seiten-Steuerung
# =======================================================
globals:
  - id: local_page
    type: int
    restore_value: yes
    initial_value: '1'
  - id: online_version
    type: std::string
    initial_value: '"Wird geprüft..."'
  - id: update_available
    type: bool
    initial_value: 'false'
  - id: update_in_progress
    type: bool
    initial_value: 'false'
  - id: last_ha_page
    type: int
    restore_value: yes
    initial_value: '-1'
  - id: auto_switch_enabled
    type: bool
    restore_value: yes
    initial_value: 'false'  # HA steuert das Auto-Switching
  - id: local_page_total
    type: int
    restore_value: no
    initial_value: '5'
  - id: touch_flash
    type: int
    restore_value: no
    initial_value: '0'
  - id: touch_override_ticks
    type: int
    restore_value: no
    initial_value: '0'
  - id: dim_start_time
    type: int
    restore_value: no
    initial_value: '22'
  - id: dim_end_time
    type: int
    restore_value: no
    initial_value: '6'
  - id: dim_brightness
    type: float
    restore_value: no
    initial_value: '20.0'
  - id: page1_enabled
    type: bool
    restore_value: yes
    initial_value: 'true'
  - id: page2_enabled
    type: bool
    restore_value: yes
    initial_value: 'true'
  - id: page3_enabled
    type: bool
    restore_value: yes
    initial_value: 'true'
  - id: page4_enabled
    type: bool
    restore_value: yes
    initial_value: 'true'
  - id: page5_enabled
    type: bool
    restore_value: yes
    initial_value: 'true'
  - id: page6_enabled
    type: bool
    restore_value: yes
    initial_value: 'true'
  - id: page7_enabled
    type: bool
    restore_value: yes
    initial_value: 'true'
  - id: page8_enabled
    type: bool
    restore_value: yes
    initial_value: 'true'
  - id: page9_enabled
    type: bool
    restore_value: yes
    initial_value: 'true'

# =======================================================
# AUTO-SEITEN-WECHSEL (lokal auf ESP32, alle 15 Sekunden)
# Laeuft nur wenn kein Touch-Override aktiv!
# =======================================================
script:
  - id: set_local_page
    parameters:
      target_page: int
    then:
      - globals.set:
          id: local_page
          value: !lambda 'return target_page;'
      - lambda: |-
          id(current_page).publish_state(target_page);
          id(last_ha_page) = target_page;
          global_preferences->sync();
          ESP_LOGI("main", "Seite gespeichert: %d", target_page);

  - id: perform_cloud_update
    then: 
      - lambda: |-
          id(update_in_progress) = true;
          ESP_LOGI("main", "Cloud Update gestartet...");
      - delay: 500ms
      - ota.http_request.flash:
          url: ${firmware_url}
          md5_url: ${md5_url}
      - lambda: |-
          // Falls wir hier ankommen, ist das Update fehlgeschlagen (sonst Reboot)
          id(update_in_progress) = false;
          ESP_LOGE("main", "Cloud Update fehlgeschlagen!");

  - id: update_ha_version
    then:
      - homeassistant.service:
          service: homeassistant.update_entity
          data:
            entity_id: sensor.cyd_online_version

  - id: evaluate_dimming
    then:
      - lambda: |-
          if (!id(current_time).now().is_valid()) return;
          int h = id(current_time).now().hour;
          int p_start = id(dim_start_time);
          int p_end = id(dim_end_time);
          float b = id(dim_brightness);
          
          bool should_dim = false;
          if (p_start < p_end) {
            should_dim = (h >= p_start && h < p_end);
          } else {
            should_dim = (h >= p_start || h < p_end);
          }
          
          static bool is_dimmed = false;
          static bool first_run = true;
          static float last_b = -1.0;
          
          // Apply changes if it's the first run, the dim state changes, or the user changes the target brightness.
          if (first_run || is_dimmed != should_dim || last_b != b) {
            auto call = id(backlight).turn_on();
            call.set_brightness(should_dim ? (b / 100.0) : 1.0);
            call.perform();
            is_dimmed = should_dim;
            last_b = b;
            first_run = false;
          }

interval:
  - interval: 1min
    then:
      - script.execute: evaluate_dimming

  - interval: 15s
    then:
      - if:
          condition:
            lambda: 'return id(auto_switch_enabled) && (id(touch_override_ticks) <= 0);'
          then:
            - lambda: |-
                int next_page = id(local_page);
                bool found = false;
                for (int i = 0; i < 9; i++) {
                  next_page++;
                  if (next_page > 9) next_page = 1;
                  bool is_en = false;
                  if (next_page == 1) is_en = id(page1_enabled);
                  if (next_page == 2) is_en = id(page2_enabled);
                  if (next_page == 3) is_en = id(page3_enabled);
                  if (next_page == 4) is_en = id(page4_enabled);
                  if (next_page == 5) is_en = id(page5_enabled);
                  if (next_page == 6) is_en = id(page6_enabled);
                  if (next_page == 7) is_en = id(page7_enabled);
                  if (next_page == 8) is_en = id(page8_enabled);
                  if (next_page == 9) is_en = id(page9_enabled);
                  if (is_en) {
                    id(set_local_page).execute(next_page);
                    found = true;
                    break;
                  }
                }
                if (!found) {
                  id(set_local_page).execute(1);
                }
                id(touch_flash) = 0;

time:
  - platform: homeassistant
    id: current_time
    timezone: Europe/Berlin

# Hardware Setup (CYD 2432S028)
# WICHTIG: Das CYD hat ZWEI separate SPI-Busse!
spi:
  - id: spi_display
    clk_pin: 14
    mosi_pin: 13
    miso_pin: 12
  - id: spi_touch
    clk_pin: 25
    mosi_pin: 32
    miso_pin: 39

output:
  - platform: ledc
    pin: 21
    id: backlight_pwm
light:
  - platform: monochromatic
    output: backlight_pwm
    name: "Display Backlight"
    id: backlight
    restore_mode: ALWAYS_ON

# Colors (OpenKairo Cyberpunk Aesthetic)
color:
  - id: color_bg
    red: 0%
    green: 0%
    blue: 0%
  - id: color_text
    red: 100%
    green: 100%
    blue: 100%
  - id: color_panel
    red: 12%
    green: 12%
    blue: 15% 
  - id: color_solar
