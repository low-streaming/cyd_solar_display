    max_value: 9
    step: 1
    optimistic: true
  - platform: template
    name: "Page Total"
    id: page_display_total
    min_value: 1
    max_value: 9
    step: 1
    optimistic: true

# Display Logic (Grow Box Design)
display:
  - platform: ili9xxx
    model: ILI9341
    id: cyd_display
    spi_id: spi_display
    cs_pin: 15
    dc_pin: 2
    invert_colors: false
    color_order: BGR
    # Palette optimization from the working Grow Box example
    color_palette: 8BIT
    rotation: 90
    lambda: |-
      static const char *TAG = "display";
      
      auto print_val = [&](int x, int y, const char *format, ...) {
        char buf[64];
        va_list args;
        va_start(args, format);
        vsnprintf(buf, sizeof(buf), format, args);
        va_end(args);
        auto font = strlen(buf) >= 8 ? id(font_value_small) : id(font_value);
        it.print(x, y, font, id(color_text), TextAlign::CENTER, buf);
      };
      
      // Background
      it.fill(id(color_bg));

      // Check if data available
      if (std::isnan(id(solar_w).state)) {
        it.print(160, 90, id(font_title), id(color_text), TextAlign::TOP_CENTER, "Warten auf Daten...");
        it.printf(160, 140, id(font_label), id(color_text), TextAlign::TOP_CENTER, "IP: %s", id(wifi_ip).state.c_str());
        return;
      }

      // Synchronisiere total-Seiten aus HA-Wert
      if (!std::isnan(id(page_display_total).state)) {
        id(local_page_total) = (int)id(page_display_total).state;
      }
      
      // Hybrid-Steuerung: Wenn Touch-Override aktiv -> lokale Seite nutzen
      // Sonst: HA-Seite (current_page) nur bei AENDERUNG uebernehmen
      int curr_ha = -1;
      if (!std::isnan(id(current_page).state)) {
        curr_ha = (int)id(current_page).state;
      }
      
      if (id(touch_override_ticks) > 0) {
        // Touch-Override: Countdown verringern
        id(touch_override_ticks)--;
        if (curr_ha != -1) {
          id(last_ha_page) = curr_ha;
        }
      } else if (id(ha_page_sync_switch).state) {
        // HA steuert: current_page -> local_page edge-triggered synchronisieren
        // Nur wenn Synchronisierung aktiv ist!
        if (curr_ha != -1 && curr_ha != id(last_ha_page)) {
          id(local_page) = curr_ha;
          id(last_ha_page) = curr_ha;
        }
      } else {
        // Fallback: Wenn nicht sync, curr_ha wegspeichern damit spaeterer Sync sauber ist
        if (curr_ha != -1) id(last_ha_page) = curr_ha;
      }
      
      int page = id(local_page);
      int total = id(local_page_total);
      if (total < 1) total = 9;
      if (page < 1 || page > 10) {
        id(local_page) = 1;
        page = 1;
      }

      // HEADER
      it.filled_rectangle(0, 0, 320, 32, id(color_panel));
      it.print(10, 16, id(font_title), id(color_solar), TextAlign::CENTER_LEFT, "OpenKairo Display");
      it.print(310, 16, id(font_title), id(color_text), TextAlign::CENTER_RIGHT, id(current_time).now().strftime("%H:%M").c_str());
      it.line(0, 32, 320, 32, id(color_text));

      if (page == 1) {
        // 1. SOLAR (Top Left)
        it.filled_rectangle(10, 42, 145, 80, id(color_panel));
        it.filled_rectangle(10, 42, 4, 80, id(color_solar));
        it.print(22, 50, id(font_label), id(color_solar), TextAlign::TOP_LEFT, "SOLAR");
        if (id(show_kw_switch).state) print_val(82, 82, "%.2f kW", id(solar_w).state / 1000.0);
        else print_val(82, 82, "%.0f W", id(solar_w).state);
        
        // 2. HAUSVERBRAUCH (Top Right)
        it.filled_rectangle(165, 42, 145, 80, id(color_panel));
        it.filled_rectangle(165, 42, 4, 80, id(color_house));
        it.print(177, 50, id(font_label), id(color_house), TextAlign::TOP_LEFT, "HAUSVERBRAUCH");
        if (id(show_kw_switch).state) print_val(237, 82, "%.2f kW", id(house_w).state / 1000.0);
        else print_val(237, 82, "%.0f W", id(house_w).state);
        
        // Battery Gauge Logic & Colors
        float soc = id(battery_soc).state;
        if (std::isnan(soc)) soc = 0;
        else if (soc > 100) soc = 100;
        else if (soc < 0) soc = 0;
        
        auto curr_bat_color = id(color_bat);
        if (soc <= 20) curr_bat_color = id(color_bat_low);
        else if (soc <= 50) curr_bat_color = id(color_bat_mid);
        else if (soc >= 95) curr_bat_color = id(color_bat_full);

        // 3. BATTERIE (Bottom Left)
        it.filled_rectangle(10, 132, 145, 80, id(color_panel));
        it.filled_rectangle(10, 132, 4, 80, curr_bat_color);
        it.print(22, 140, id(font_label), curr_bat_color, TextAlign::TOP_LEFT, "BATTERIE");
        
        // Large Percentage Display
        print_val(82, 166, "%.0f %%", soc);
        
        // Battery Icon Outline
        it.rectangle(20, 186, 75, 14, id(color_text));
        // Battery Tip
        it.filled_rectangle(95, 190, 3, 6, id(color_text));
        
        // Battery Fill
        int fill_w = (int)((soc / 100.0) * 71.0);
        if (fill_w > 0) {
          it.filled_rectangle(22, 188, fill_w, 10, curr_bat_color);
        }
        
        // Watt Text next to gauge
        if (id(show_kw_switch).state) {
          it.printf(104, 193, id(font_label), id(color_text), TextAlign::CENTER_LEFT, "%.2f kW", id(battery_w).state / 1000.0);
        } else {
          it.printf(104, 193, id(font_label), id(color_text), TextAlign::CENTER_LEFT, "%.0f W", id(battery_w).state);
        }
        
        // 4. NETZ (Bottom Right)
        auto g_val = id(grid_w).state;
        auto g_color = (g_val <= 0) ? id(color_grid_out) : id(color_grid_in);
        const char* g_label = (g_val <= 0) ? "EINSPEISUNG" : "NETZBEZUG";
        it.filled_rectangle(165, 132, 145, 80, id(color_panel));
        it.filled_rectangle(165, 132, 4, 80, g_color);
        it.print(177, 140, id(font_label), g_color, TextAlign::TOP_LEFT, g_label);
        if (id(show_kw_switch).state) print_val(237, 172, "%.2f kW", abs(g_val) / 1000.0);
        else print_val(237, 172, "%.0f W", abs(g_val));
      } else if (page == 2) {
        // PAGE 2 (STATISTICS) - OPENKAIRO STYLE
        
        // 1. ERTRAG TAG
        it.filled_rectangle(10, 42, 145, 80, id(color_panel));
        it.filled_rectangle(10, 42, 4, 80, id(color_solar));
        it.print(22, 50, id(font_label), id(color_solar), TextAlign::TOP_LEFT, "ERTRAG TAG");
        print_val(82, 82, "%.1f kWh", id(yield_today).state);
        
        // 2. ERTRAG MONAT
        it.filled_rectangle(165, 42, 145, 80, id(color_panel));
        it.filled_rectangle(165, 42, 4, 80, id(color_solar));
        it.print(177, 50, id(font_label), id(color_solar), TextAlign::TOP_LEFT, "ERTRAG MONAT");
        print_val(237, 82, "%.1f kWh", id(yield_month).state);

        // 3. ERTRAG JAHR
        it.filled_rectangle(10, 132, 145, 80, id(color_panel));
        it.filled_rectangle(10, 132, 4, 80, id(color_solar));
        it.print(22, 140, id(font_label), id(color_solar), TextAlign::TOP_LEFT, "ERTRAG JAHR");
        print_val(82, 172, "%.0f kWh", id(yield_year).state);

        // 4. GESAMTERTRAG
        it.filled_rectangle(165, 132, 145, 80, id(color_panel));
        it.filled_rectangle(165, 132, 4, 80, id(color_solar));
        it.print(177, 140, id(font_label), id(color_solar), TextAlign::TOP_LEFT, "GESAMTERTRAG");
        print_val(237, 172, "%.0f kWh", id(yield_total).state); 
      } else if (page == 3) {
        // PAGE 3 (CUSTOM OPENKAIRO SENSORS)
        
        // C1
        if (id(custom1_v).state.length() > 0 && id(custom1_v).state != "Unbekannt") {
          it.filled_rectangle(10, 42, 145, 80, id(color_panel));
          it.filled_rectangle(10, 42, 4, 80, id(color_house)); 
          it.print(22, 50, id(font_label), id(color_house), TextAlign::TOP_LEFT, id(custom1_n).state.c_str());
          print_val(82, 82, "%s", id(custom1_v).state.c_str());
        }
        
        // C2
        if (id(custom2_v).state.length() > 0 && id(custom2_v).state != "Unbekannt") {
          it.filled_rectangle(165, 42, 145, 80, id(color_panel));
          it.filled_rectangle(165, 42, 4, 80, id(color_grid_out));
          it.print(177, 50, id(font_label), id(color_grid_out), TextAlign::TOP_LEFT, id(custom2_n).state.c_str());
          print_val(237, 82, "%s", id(custom2_v).state.c_str());
        }

        // C3
        if (id(custom3_v).state.length() > 0 && id(custom3_v).state != "Unbekannt") {
          it.filled_rectangle(10, 132, 145, 80, id(color_panel));
          it.filled_rectangle(10, 132, 4, 80, id(color_bat));
          it.print(22, 140, id(font_label), id(color_bat), TextAlign::TOP_LEFT, id(custom3_n).state.c_str());
          print_val(82, 172, "%s", id(custom3_v).state.c_str());
        }

        // C4
        if (id(custom4_v).state.length() > 0 && id(custom4_v).state != "Unbekannt") {
          it.filled_rectangle(165, 132, 145, 80, id(color_panel));
          it.filled_rectangle(165, 132, 4, 80, id(color_grid_in));
          it.print(177, 140, id(font_label), id(color_grid_in), TextAlign::TOP_LEFT, id(custom4_n).state.c_str());
          print_val(237, 172, "%s", id(custom4_v).state.c_str()); 
        }
      } else if (page >= 4 && page <= 9) {
          it.printf(160, 120, id(font_title), id(color_text), TextAlign::CENTER, "Custom Page %d", page);
      } else if (page == 10) {
        // PAGE 10 (SYSTEM, CLOUD UPDATE & SELL INFO)
        it.filled_rectangle(10, 42, 300, 172, id(color_panel));
        it.filled_rectangle(10, 42, 4, 172, id(id(update_available) ? color_solar : color_house));
        it.print(22, 50, id(font_label), id(color_solar), TextAlign::TOP_LEFT, "SYSTEM & CLOUD UPDATE");
        
        it.printf(22, 75, id(font_label), id(color_text), TextAlign::TOP_LEFT, "Version: %s", "${version}");
        it.printf(22, 90, id(font_label), id(color_text), TextAlign::TOP_LEFT, "Online:  %s", id(online_version).c_str());
        it.printf(22, 105, id(font_label), id(color_text), TextAlign::TOP_LEFT, "IP: %s", id(wifi_ip).state.c_str());
        
        // Buttons
        // Button 1: Restart
        it.filled_rectangle(22, 135, 130, 40, id(color_bg));
        it.rectangle(22, 135, 130, 40, id(color_text));
        it.print(87, 155, id(font_label), id(color_text), TextAlign::CENTER, "NEUSTART");
        
        // Button 2: Cloud Update (nur wenn verfügbar)
        if (id(update_in_progress)) {
            it.filled_rectangle(162, 135, 138, 40, id(color_solar));
            it.print(231, 155, id(font_label), id(color_bg), TextAlign::CENTER, "LADE...");
        } else if (id(update_available)) {
            it.filled_rectangle(162, 135, 138, 40, id(color_solar));
            it.print(231, 155, id(font_label), id(color_bg), TextAlign::CENTER, "JETZT UPDATEN");
        } else {
            it.rectangle(162, 135, 138, 40, id(color_text));
            it.print(231, 155, id(font_label), id(color_text), TextAlign::CENTER, "AKTUELL");
        }
        
        it.print(160, 195, id(font_label), id(color_text), TextAlign::CENTER, "Forgematrix.de x Openkairo.de");
      }

      // FOOTER
      it.filled_rectangle(0, 222, 320, 18, id(color_panel));
      it.line(0, 222, 320, 222, id(color_text));
      
      // Touch-Flash: zeige Tippen-Symbol kurz an
      if (id(touch_flash) > 0) {
        id(touch_flash)--;
        it.printf(5, 231, id(font_label), id(color_solar), TextAlign::CENTER_LEFT, "< >");
      }
      
      // Seitenanzeige (lokal) mit korrekter Index-Berechnung
      int idx = 0;
      int tot = 0;
      bool p[9] = {
        id(page1_enabled), id(page2_enabled), id(page3_enabled), 
        id(page4_enabled), id(page5_enabled), id(page6_enabled),
        id(page7_enabled), id(page8_enabled), id(page9_enabled)
      };
      for(int i=0; i<9; i++){
        if(p[i]) {
          tot++;
          if((i+1) == page) idx = tot;
        }
      }
      if(idx == 0) idx = 1;
      if(tot == 0) tot = (page == 10) ? 10 : total;
      
      const char* footer_text = (page == 10) ? "SYSTEM-INFO" : "SEITE %d / %d";
      if (page == 10) it.printf(160, 231, id(font_label), id(color_solar), TextAlign::CENTER, footer_text);
      else it.printf(160, 231, id(font_label), id(color_house), TextAlign::CENTER, footer_text, idx, tot);
      
      // Periodisch den tatsaechlichen Index an HA zurueckmelden (alle ~2s bei ~30Hz Refresh)
      static int report_throttle = 0;
      if (report_throttle++ > 60) {
          report_throttle = 0;
          id(page_display_idx).publish_state(idx);
          id(page_display_total).publish_state(tot);
      }
      
      // Touch-Override-Anzeige rechts im Footer
      if (id(touch_override_ticks) > 0) {
        it.print(315, 231, id(font_label), id(color_solar), TextAlign::CENTER_RIGHT, "[>"); // aktiv
      } else {
        it.print(315, 231, id(font_label), id(color_text), TextAlign::CENTER_RIGHT, "[>"); // normal
      }

# =======================================================
# TOUCHSCREEN Setup
# =======================================================
touchscreen:
  - platform: xpt2046
    id: my_touch
    spi_id: spi_touch
    display: cyd_display
    cs_pin: 33
    interrupt_pin: 36
    threshold: 400
    update_interval: 0ms
    calibration:
      x_min: 380
      x_max: 3800
      y_min: 300
      y_max: 3800
    transform:
      mirror_x: false
      mirror_y: false
      swap_xy: true
    on_touch:
      then:
        - lambda: |-
            int tx = touch.x;
            int ty = touch.y;
            ESP_LOGI("touch", "Touch-Event: X=%d, Y=%d", tx, ty);
            
            // Check for System Page Buttons (Page 10)
            if (id(local_page) == 10) {
              if (ty > 130 && ty < 185) {
                if (tx > 15 && tx < 158) {
                  id(touch_flash) = 3;
                  id(touch_override_ticks) = 30;
                  id(cyd_restart).press();
                  return;
                }
                if (tx > 160 && tx < 315) {
                   if (id(update_available) && !id(update_in_progress)) {
                      id(perform_cloud_update).execute();
                   } else {
                      id(update_ha_version).execute();
                   }
                   id(touch_flash) = 3;
                   id(touch_override_ticks) = 30;
                   return;
                }
              }
            }

            int next_page = id(local_page);
            bool found = false;
            for (int i = 0; i < 10; i++) {
              next_page++;
              if (next_page > 10) next_page = 1;
              if (next_page == 10) {
                id(set_local_page).execute(10);
                found = true;
                break;
              }
              bool is_en = false;
              if (next_page == 1) is_en = id(page1_enabled);
              if (next_page == 2) is_en = id(page2_enabled);
              if (next_page == 3) is_en = id(page3_enabled);
              if (next_page == 4) is_en = id(page4_enabled);
              if (next_page == 5) is_en = id(page5_enabled);
              if (next_page == 6) is_en = id(page6_enabled);
              if (next_page == 7) is_en = id(page7_enabled);
              if (next_page == 8) is_en = id(page8_enabled);
              if (next_page == 9) is_en = id(page9_enabled);
              if (is_en) {
                id(set_local_page).execute(next_page);
                found = true;
                break;
              }
            }
            if (!found) {
              id(set_local_page).execute(1);
            }
            id(touch_flash) = 3;
            id(touch_override_ticks) = 30;

# =======================================================
# TOUCH BUTTON - GANZER BILDSCHIRM
# Ueberall tippen = naechste Seite
# =======================================================
binary_sensor:
  - platform: touchscreen
    touchscreen_id: my_touch
    name: "Display Touch Aktiv"
    x_min: 0
    x_max: 320
    y_min: 0
    y_max: 240
