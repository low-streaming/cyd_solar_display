# =======================================================
# CYD SOLAR MONITOR - GROW BOX DESIGN V2
# Touch + Auto-Page-Switch Edition
# =======================================================
substitutions:
  name: "cyd-solar-display"
  friendly_name: "CYD Solar Display"
  version: "1.2.4"
  # Zentrale Update-Server-URLs (GitHub RAW - Professional)
  firmware_url: "https://raw.githubusercontent.com/low-streaming/cyd_solar_display/main/cyd_solar_display.bin"
  version_url: "https://raw.githubusercontent.com/low-streaming/cyd_solar_display/main/version.txt"
  md5_url: "https://raw.githubusercontent.com/low-streaming/cyd_solar_display/main/cyd_solar_display.md5"

esphome:
  name: ${name}
  name_add_mac_suffix: true
  friendly_name: ${friendly_name}
  on_boot:
    priority: -10
    then:
      - lambda: |-
          // Restore indices
          id(current_page).publish_state(id(local_page));
          id(last_ha_page) = id(local_page);
          
          // Recalculate and publish indices
          int idx = 0;
          int tot = 0;
          bool p[9] = {
            id(page1_enabled), id(page2_enabled), id(page3_enabled), 
            id(page4_enabled), id(page5_enabled), id(page6_enabled),
            id(page7_enabled), id(page8_enabled), id(page9_enabled)
          };
          for(int i=0; i<9; i++){
            if(p[i]) {
              tot++;
              if((i+1) == id(local_page)) idx = tot;
            }
          }
          if (idx > 0) id(page_display_idx).publish_state(idx);
          if (tot > 0) id(page_display_total).publish_state(tot);

  platformio_options:
    build_flags: ["-DCONFIG_ARDUINO_LOOP_STACK_SIZE=32768"]

esp32:
  board: esp32dev
  framework:
    type: arduino

# WiFi & API
wifi:
  ap:
    ssid: "CYD-Solar-Setup"
    password: ""
captive_portal:
web_server:
  id: web_server_id
  port: 80

