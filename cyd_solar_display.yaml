    id: ha_page_sync_switch
    restore_mode: RESTORE_DEFAULT_OFF
    optimistic: true

number:
  - platform: template
    name: "Current Page"
    id: current_page
    min_value: 1
    max_value: 10
    step: 1
    optimistic: true
    restore_value: true
  - platform: template
    name: "Page Index"
    id: page_display_idx
    min_value: 1
    max_value: 9
    step: 1
    optimistic: true
  - platform: template
    name: "Page Total"
    id: page_display_total
    min_value: 1
    max_value: 9
    step: 1
    optimistic: true

display:
  - platform: ili9xxx
    model: ILI9341
    id: cyd_display
    spi_id: spi_display
    cs_pin: 15
    dc_pin: 2
    invert_colors: false
    color_order: BGR
    color_palette: 8BIT
    rotation: 90
    lambda: |-
      static const char *TAG = "display";
      it.fill(id(color_bg));

      if (std::isnan(id(solar_w).state)) {
        it.print(160, 90, id(font_title), id(color_text), TextAlign::TOP_CENTER, "Warten auf Daten...");
        it.printf(160, 140, id(font_label), id(color_text), TextAlign::TOP_CENTER, "IP: %s", id(wifi_ip).state.c_str());
        return;
      }

      if (!std::isnan(id(page_display_total).state)) id(local_page_total) = (int)id(page_display_total).state;
      int curr_ha = !std::isnan(id(current_page).state) ? (int)id(current_page).state : -1;
      
      if (id(touch_override_ticks) > 0) {
        id(touch_override_ticks)--;
        if (curr_ha != -1) id(last_ha_page) = curr_ha;
      } else if (id(ha_page_sync_switch).state) {
        if (curr_ha != -1 && curr_ha != id(last_ha_page)) {
          id(local_page) = curr_ha;
          id(last_ha_page) = curr_ha;
        }
      } else {
        if (curr_ha != -1) id(last_ha_page) = curr_ha;
      }
      
      int page = id(local_page);
      if (page < 1 || page > 10) page = 1;

      it.filled_rectangle(0, 0, 320, 32, id(color_panel));
      it.print(10, 16, id(font_title), id(color_solar), TextAlign::CENTER_LEFT, "OpenKairo Display");
      it.print(310, 16, id(font_title), id(color_text), TextAlign::CENTER_RIGHT, id(current_time).now().strftime("%H:%M").c_str());
      it.line(0, 32, 320, 32, id(color_text));

      if (page == 1) {
        it.filled_rectangle(10, 42, 145, 80, id(color_panel));
        it.filled_rectangle(10, 42, 4, 80, id(color_solar));
        it.print(22, 50, id(font_label), id(color_solar), TextAlign::TOP_LEFT, "SOLAR");
        if (id(show_kw_switch).state) it.printf(82, 82, id(font_value), id(color_text), TextAlign::CENTER, "%.2f kW", id(solar_w).state / 1000.0);
        else it.printf(82, 82, id(font_value), id(color_text), TextAlign::CENTER, "%.0f W", id(solar_w).state);
        
        it.filled_rectangle(165, 42, 145, 80, id(color_panel));
        it.filled_rectangle(165, 42, 4, 80, id(color_house));
        it.print(177, 50, id(font_label), id(color_house), TextAlign::TOP_LEFT, "HAUSVERBRAUCH");
        if (id(show_kw_switch).state) it.printf(237, 82, id(font_value), id(color_text), TextAlign::CENTER, "%.2f kW", id(house_w).state / 1000.0);
        else it.printf(237, 82, id(font_value), id(color_text), TextAlign::CENTER, "%.0f W", id(house_w).state);
        
        float soc = id(battery_soc).state;
        auto c_bat = (soc <= 20) ? id(color_bat_low) : (soc <= 50 ? id(color_bat_mid) : (soc >= 95 ? id(color_bat_full) : id(color_bat)));
        it.filled_rectangle(10, 132, 145, 80, id(color_panel));
        it.filled_rectangle(10, 132, 4, 80, c_bat);
        it.print(22, 140, id(font_label), c_bat, TextAlign::TOP_LEFT, "BATTERIE");
        it.printf(82, 166, id(font_value), id(color_text), TextAlign::CENTER, "%.0f %%", soc);
        it.rectangle(20, 186, 75, 14, id(color_text));
        it.filled_rectangle(22, 188, (int)((soc / 100.0) * 71.0), 10, c_bat);
        
        auto g_val = id(grid_w).state;
        auto g_color = (g_val <= 0) ? id(color_grid_out) : id(color_grid_in);
        it.filled_rectangle(165, 132, 145, 80, id(color_panel));
        it.filled_rectangle(165, 132, 4, 80, g_color);
        it.print(177, 140, id(font_label), g_color, TextAlign::TOP_LEFT, (g_val <= 0 ? "EINSPEISUNG" : "NETZBEZUG"));
        if (id(show_kw_switch).state) it.printf(237, 172, id(font_value), id(color_text), TextAlign::CENTER, "%.2f kW", abs(g_val) / 1000.0);
        else it.printf(237, 172, id(font_value), id(color_text), TextAlign::CENTER, "%.0f W", abs(g_val));
      } else if (page == 2) {
        it.filled_rectangle(10, 42, 145, 80, id(color_panel)); it.filled_rectangle(10, 42, 4, 80, id(color_solar)); it.print(22, 50, id(font_label), id(color_solar), TextAlign::TOP_LEFT, "TAG"); it.printf(82, 82, id(font_value), id(color_text), TextAlign::CENTER, "%.1f kWh", id(yield_today).state);
        it.filled_rectangle(165, 42, 145, 80, id(color_panel)); it.filled_rectangle(165, 42, 4, 80, id(color_solar)); it.print(177, 50, id(font_label), id(color_solar), TextAlign::TOP_LEFT, "MONAT"); it.printf(237, 82, id(font_value), id(color_text), TextAlign::CENTER, "%.1f kWh", id(yield_month).state);
        it.filled_rectangle(10, 132, 145, 80, id(color_panel)); it.filled_rectangle(10, 132, 4, 80, id(color_solar)); it.print(22, 140, id(font_label), id(color_solar), TextAlign::TOP_LEFT, "JAHR"); it.printf(82, 172, id(font_value), id(color_text), TextAlign::CENTER, "%.0f kWh", id(yield_year).state);
        it.filled_rectangle(165, 132, 145, 80, id(color_panel)); it.filled_rectangle(165, 132, 4, 80, id(color_solar)); it.print(177, 140, id(font_label), id(color_solar), TextAlign::TOP_LEFT, "TOTAL"); it.printf(237, 172, id(font_value), id(color_text), TextAlign::CENTER, "%.0f kWh", id(yield_total).state);
      } else if (page >= 3 && page <= 9) {
        text_sensor::TextSensor* ns[4];
        text_sensor::TextSensor* vs[4];
        if(page==3){ ns[0]=id(custom1_n); ns[1]=id(custom2_n); ns[2]=id(custom3_n); ns[3]=id(custom4_n); vs[0]=id(custom1_v); vs[1]=id(custom2_v); vs[2]=id(custom3_v); vs[3]=id(custom4_v); }
        else if(page==4){ ns[0]=id(custom5_n); ns[1]=id(custom6_n); ns[2]=id(custom7_n); ns[3]=id(custom8_n); vs[0]=id(custom5_v); vs[1]=id(custom6_v); vs[2]=id(custom7_v); vs[3]=id(custom8_v); }
        else if(page==5){ ns[0]=id(custom9_n); ns[1]=id(custom10_n); ns[2]=id(custom11_n); ns[3]=id(custom12_n); vs[0]=id(custom9_v); vs[1]=id(custom10_v); vs[2]=id(custom11_v); vs[3]=id(custom12_v); }
        else if(page==6){ ns[0]=id(custom13_n); ns[1]=id(custom14_n); ns[2]=id(custom15_n); ns[3]=id(custom16_n); vs[0]=id(custom13_v); vs[1]=id(custom14_v); vs[2]=id(custom15_v); vs[3]=id(custom16_v); }
        else if(page==7){ ns[0]=id(custom17_n); ns[1]=id(custom18_n); ns[2]=id(custom19_n); ns[3]=id(custom20_n); vs[0]=id(custom17_v); vs[1]=id(custom18_v); vs[2]=id(custom19_v); vs[3]=id(custom20_v); }
        else if(page==8){ ns[0]=id(custom21_n); ns[1]=id(custom22_n); ns[2]=id(custom23_n); ns[3]=id(custom24_n); vs[0]=id(custom21_v); vs[1]=id(custom22_v); vs[2]=id(custom23_v); vs[3]=id(custom24_v); }
        else { ns[0]=id(custom25_n); ns[1]=id(custom26_n); ns[2]=id(custom27_n); ns[3]=id(custom28_n); vs[0]=id(custom25_v); vs[1]=id(custom26_v); vs[2]=id(custom27_v); vs[3]=id(custom28_v); }
        
        for(int i=0; i<4; i++){
          int row = i / 2; int col = i % 2;
          int x = 10 + col*155; int y = 42 + row*90;
          it.filled_rectangle(x, y, 145, 80, id(color_panel));
          it.filled_rectangle(x, y, 4, 80, id(color_solar));
          if(ns[i]->state.length() > 0) {
            it.print(x+12, y+8, id(font_label), id(color_solar), TextAlign::TOP_LEFT, ns[i]->state.c_str());
            auto val = vs[i]->state;
            auto f = val.length() > 8 ? id(font_value_small) : id(font_value);
            it.print(x+72, y+40, f, id(color_text), TextAlign::CENTER, val.c_str());
          }
        }
      } else if (page == 10) {
        it.filled_rectangle(10, 42, 300, 172, id(color_panel)); it.filled_rectangle(10, 42, 4, 172, id(color_house)); it.print(22, 50, id(font_label), id(color_solar), TextAlign::TOP_LEFT, "SYSTEM INFO"); it.printf(22, 75, id(font_label), id(color_text), TextAlign::TOP_LEFT, "Version: %s", "1.2.6"); it.printf(22, 105, id(font_label), id(color_text), TextAlign::TOP_LEFT, "IP: %s", id(wifi_ip).state.c_str());
        it.filled_rectangle(22, 135, 130, 40, id(color_bg)); it.rectangle(22, 135, 130, 40, id(color_text)); it.print(87, 155, id(font_label), id(color_text), TextAlign::CENTER, "NEUSTART"); it.print(160, 195, id(font_label), id(color_text), TextAlign::CENTER, "Forgematrix.de x Openkairo.de");
      }

      it.filled_rectangle(0, 222, 320, 18, id(color_panel)); it.line(0, 222, 320, 222, id(color_text));
      if (id(touch_flash) > 0) { id(touch_flash)--; it.print(5, 231, id(font_label), id(color_solar), TextAlign::CENTER_LEFT, "< >"); }
      int idx = 0; int tot = 0; bool p[9] = {id(page1_enabled), id(page2_enabled), id(page3_enabled), id(page4_enabled), id(page5_enabled), id(page6_enabled), id(page7_enabled), id(page8_enabled), id(page9_enabled)};
      for(int i=0; i<9; i++){ if(p[i]) { tot++; if((i+1) == page) idx = tot; } }
      if (page == 10) it.print(160, 231, id(font_label), id(color_solar), TextAlign::CENTER, "SYSTEM-INFO");
      else it.printf(160, 231, id(font_label), id(color_house), TextAlign::CENTER, "SEITE %d / %d", idx > 0 ? idx : 1, tot > 0 ? tot : 1);
      it.print(315, 231, id(font_label), id(id(touch_override_ticks) > 0 ? color_solar : color_text), TextAlign::CENTER_RIGHT, "[>");

touchscreen:
  - platform: xpt2046
    id: my_touch
    spi_id: spi_touch
    display: cyd_display
    cs_pin: 33
    interrupt_pin: 36
    threshold: 400
    update_interval: 0ms
    calibration: {x_min: 380, x_max: 3800, y_min: 300, y_max: 3800}
    transform: {mirror_x: false, mirror_y: false, swap_xy: true}
    on_touch:
      then:
        - lambda: |-
            int tx = touch.x; int ty = touch.y;
            if (id(local_page) == 10 && ty > 130 && ty < 185 && tx > 15 && tx < 158) { id(cyd_restart).press(); return; }
            int next_page = id(local_page); bool found = false;
            for (int i = 0; i < 10; i++) {
              next_page++; if (next_page > 10) next_page = 1;
              if (next_page == 10) { id(set_local_page).execute(10); found = true; break; }
              bool is_e = (next_page == 1) ? id(page1_enabled) : (next_page == 2 ? id(page2_enabled) : (next_page == 3 ? id(page3_enabled) : (next_page == 4 ? id(page4_enabled) : (next_page == 5 ? id(page5_enabled) : (next_page == 6 ? id(page6_enabled) : (next_page == 7 ? id(page7_enabled) : (next_page == 8 ? id(page8_enabled) : id(page9_enabled))))))));
              if (is_e) { id(set_local_page).execute(next_page); found = true; break; }
            }
            if (!found) id(set_local_page).execute(1);
            id(touch_flash) = 3; id(touch_override_ticks) = 30;

binary_sensor:
  - platform: touchscreen
    touchscreen_id: my_touch
    name: "Display Touch Aktiv"
    x_min: 0
    x_max: 320
    y_min: 0
    y_max: 240
